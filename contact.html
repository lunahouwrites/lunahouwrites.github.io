<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Luna Hou</title>
    <link rel="stylesheet" href="css/style.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Emilys+Candy&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
    
<body>

    <header class="site-header">
        <nav class="navbar">
            <div class="logo">
                <a href="index.html">Luna Hou</a>
            </div>

            <ul class="nav-links" id="navLinks">
                <li><a href="about.html">About</a></li>
                <li><a href="publications.html">Publications</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>

            <button class="hamburger" id="hamburger">
                ☰
            </button>
        </nav>
    </header>

    <main>
        <section class="contact">

            <div class="contact-heading">
                <h1>Contact</h1>
                <p>I'd love to connect! Send me a message here. 💌 </p>
            </div>

            <form class="contact-form" action="https://api.web3forms.com/submit" method="POST">

                <input type="hidden" name="access_key" value="f828d97d-b4cd-4cbb-9f65-31640cb6758b">
                
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>

                <label for="message">Message</label>
                <textarea id="message" name="message" rows="6" required></textarea>

                <button type="submit" class="contact-button">Send</button>
                
            </form>

        </section>
    </main>

    <footer>
        <div class="footer-icons">
            <a href="mailto:yourname@email.com"><i class="fa-solid fa-envelope"></i></a>
            <a href="https://linkedin.com/in/lunahou" target="_blank"><i class="fa-brands fa-linkedin"></i></a>
            <a href="https://instagram.com/lunahou_" target="_blank"><i class="fa-brands fa-instagram"></i></a>
        </div>

        <p> © 2026 Luna Hou </p>
    </footer>

<script>
window.addEventListener("scroll", function () {

    const header = document.querySelector(".site-header");

    if (window.scrollY > 20) {
        header.classList.add("scrolled");
    } else {
        header.classList.remove("scrolled");
    }

});

const hamburger = document.getElementById("hamburger");
const navLinks = document.getElementById("navLinks");

hamburger.addEventListener("click", () => {
    navLinks.classList.toggle("active");
    hamburger.classList.toggle("active");
});

</script>

</body>

</html>
